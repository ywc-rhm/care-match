<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>購物船艙 - 群島生態系</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ocean: '#0891B2',
            'ocean-light': '#22D3EE',
            sand: '#F5F0E8',
            coral: '#F97316',
            island: '#059669',
            'island-light': '#34D399',
            night: '#0F172A'
          },
          fontFamily: {
            sans: ['Noto Sans TC', 'sans-serif'],
            display: ['Nunito', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    .ocean-bg {
      background: linear-gradient(180deg, #E0F2FE 0%, #F5F0E8 100%);
    }
    
    .ship-bg {
      background: linear-gradient(135deg, #0F766E 0%, #115E59 50%, #134E4A 100%);
    }
    
    .qty-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-bold;
      transition: all 0.2s ease;
    }
    .qty-btn:hover {
      transform: scale(1.1);
    }
    .qty-btn.minus {
      background: #FEE2E2;
      color: #DC2626;
    }
    .qty-btn.plus {
      background: #DCFCE7;
      color: #16A34A;
    }

    .cart-item {
      background: white;
      border-radius: 16px;
      transition: all 0.3s ease;
    }
    .cart-item:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .remove-btn {
      transition: all 0.2s ease;
    }
    .remove-btn:hover {
      color: #DC2626;
      transform: scale(1.2);
    }

    .promo-input {
      border: 2px dashed #CBD5E1;
      border-radius: 12px;
      transition: all 0.3s ease;
    }
    .promo-input:focus {
      border-color: #0891B2;
      border-style: solid;
    }

    .checkout-btn {
      background: linear-gradient(135deg, #F97316 0%, #EA580C 100%);
      transition: all 0.3s ease;
    }
    .checkout-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 10px 30px -10px rgba(249, 115, 22, 0.5);
    }
  </style>
</head>
<body class="ocean-bg font-sans min-h-screen">
  
  <!-- Header -->
  <header class="bg-white/80 backdrop-blur-lg sticky top-0 z-50 border-b border-ocean/10">
    <div class="max-w-4xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-3">
          <div class="w-12 h-12 bg-gradient-to-br from-ocean to-island rounded-full flex items-center justify-center shadow-lg">
            <span class="text-2xl">🏝️</span>
          </div>
          <div>
            <span class="font-display font-bold text-xl text-night">群島生態系</span>
          </div>
        </a>
        <a href="shop.html" class="flex items-center gap-2 text-ocean hover:underline">
          ← 繼續購物
        </a>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-4xl mx-auto px-4 py-8">
    
    <!-- Title -->
    <div class="flex items-center gap-3 mb-6">
      <div class="w-12 h-12 ship-bg rounded-full flex items-center justify-center">
        <span class="text-2xl">🚢</span>
      </div>
      <div>
        <h1 class="font-display font-bold text-2xl text-night">我的購物船艙</h1>
        <p class="text-gray-500 text-sm">精選長照小輔具，即將啟航配送</p>
      </div>
    </div>

    <!-- Cart Container -->
    <div id="cartContainer" class="space-y-4">
      
      <!-- Empty State -->
      <div id="emptyCart" class="hidden bg-white rounded-3xl p-12 text-center">
        <div class="text-8xl mb-4">🛒</div>
        <h2 class="font-bold text-xl text-night mb-2">船艙空空如也</h2>
        <p class="text-gray-500 mb-6">快去島嶼補給站挑選需要的輔具吧！</p>
        <a href="shop.html" class="inline-flex items-center gap-2 bg-gradient-to-r from-ocean to-island text-white px-6 py-3 rounded-xl font-medium">
          🛒 前往補給站
        </a>
      </div>

      <!-- Cart Items -->
      <div id="cartItems" class="space-y-4"></div>

      <!-- Order Summary -->
      <div id="orderSummary" class="bg-white rounded-3xl p-6 shadow-lg border border-gray-100">
        <h3 class="font-bold text-lg text-night mb-4">📋 航程費用明細</h3>
        
        <div class="space-y-3 mb-4">
          <div class="flex justify-between text-gray-600">
            <span>商品小計</span>
            <span id="subtotal">$0</span>
          </div>
          <div class="flex justify-between text-gray-600">
            <span>運費</span>
            <span id="shipping">$0</span>
          </div>
          <div class="flex justify-between text-gray-600">
            <span>優惠折扣</span>
            <span id="discount" class="text-green-600">-$0</span>
          </div>
        </div>

        <div class="border-t border-gray-100 pt-4 mb-6">
          <div class="flex justify-between font-bold text-xl text-night">
            <span>總計</span>
            <span id="total" class="text-coral">$0</span>
          </div>
        </div>

        <!-- Promo Code -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-600 mb-2">🎫 優惠序號</label>
          <div class="flex gap-2">
            <input type="text" id="promoCode" placeholder="輸入優惠碼" class="promo-input flex-1 px-4 py-3 focus:outline-none">
            <button onclick="applyPromo()" class="px-5 py-3 bg-gray-100 text-gray-700 rounded-xl font-medium hover:bg-gray-200 transition">
              套用
            </button>
          </div>
          <p class="text-xs text-gray-400 mt-1">展示用代碼：ISLAND10（可享10%折扣）</p>
        </div>

        <!-- Checkout Button -->
        <button onclick="checkout()" class="w-full checkout-btn text-white py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2">
          🚢 啟航結帳
        </button>

        <p class="text-center text-xs text-gray-400 mt-4">點擊結帳即表示同意我們的服務條款與隱私權政策</p>
      </div>

      <!-- Shipping Info -->
      <div class="bg-blue-50 rounded-2xl p-5 border border-blue-100">
        <h4 class="font-bold text-blue-800 mb-3">🚚 配送資訊</h4>
        <ul class="space-y-2 text-sm text-blue-700">
          <li>• 滿 $1,000 免運費（限本島）</li>
          <li>• 訂單確認後 2-3 個工作天出貨</li>
          <li>• 外島地區運費另計</li>
        </ul>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-night text-white py-8 mt-12">
    <div class="max-w-6xl mx-auto px-4 text-center">
      <div class="flex items-center justify-center gap-2 mb-4">
        <span class="text-2xl">🏝️</span>
        <span class="font-display font-bold">群島生態系</span>
      </div>
      <p class="text-gray-400 text-sm">© 2024 群島生態系長照服務平台 | 守護每座島嶼的幸福</p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let appliedPromo = null;

    function renderCart() {
      const itemsContainer = document.getElementById('cartItems');
      const emptyCart = document.getElementById('emptyCart');
      const orderSummary = document.getElementById('orderSummary');

      if (cart.length === 0) {
        emptyCart.classList.remove('hidden');
        orderSummary.classList.add('hidden');
        itemsContainer.innerHTML = '';
        return;
      }

      emptyCart.classList.add('hidden');
      orderSummary.classList.remove('hidden');

      const emojis = ['🦽', '🛏️', '⚠️', '💊', '🧘', '🦯', '🛁', '🚨'];
      
      itemsContainer.innerHTML = cart.map((item, idx) => `
        <div class="cart-item p-5 flex items-center gap-4">
          <div class="w-20 h-20 bg-gradient-to-br from-green-50 to-green-100 rounded-xl flex items-center justify-center text-4xl flex-shrink-0">
            ${emojis[idx % emojis.length]}
          </div>
          <div class="flex-1">
            <h3 class="font-bold text-night">${item.name}</h3>
            <p class="text-coral font-bold">$${item.price.toLocaleString()}</p>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="changeQty(${idx}, -1)" class="qty-btn minus">−</button>
            <span class="w-8 text-center font-bold">${item.qty}</span>
            <button onclick="changeQty(${idx}, 1)" class="qty-btn plus">+</button>
          </div>
          <div class="text-right">
            <div class="font-bold text-night">$${(item.price * item.qty).toLocaleString()}</div>
            <button onclick="removeItem(${idx})" class="remove-btn text-gray-400 text-sm mt-1">🗑️ 刪除</button>
          </div>
        </div>
      `).join('');

      updateTotals();
    }

    function changeQty(idx, delta) {
      cart[idx].qty += delta;
      if (cart[idx].qty <= 0) {
        cart.splice(idx, 1);
      }
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
    }

    function removeItem(idx) {
      cart.splice(idx, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
    }

    function updateTotals() {
      const subtotal = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
      const shipping = subtotal >= 1000 ? 0 : 100;
      let discount = 0;
      
      if (appliedPromo === 'ISLAND10') {
        discount = Math.floor(subtotal * 0.1);
      }
      
      const total = subtotal + shipping - discount;

      document.getElementById('subtotal').textContent = `$${subtotal.toLocaleString()}`;
      document.getElementById('shipping').textContent = shipping === 0 ? '免費' : `$${shipping}`;
      document.getElementById('discount').textContent = `-$${discount.toLocaleString()}`;
      document.getElementById('total').textContent = `$${total.toLocaleString()}`;
    }

    function applyPromo() {
      const code = document.getElementById('promoCode').value.trim().toUpperCase();
      if (code === 'ISLAND10') {
        appliedPromo = code;
        updateTotals();
        alert('🎉 優惠碼已套用：10% 折扣！');
      } else {
        alert('❌ 無效的優惠碼');
      }
    }

    function checkout() {
      if (cart.length === 0) {
        alert('購物船艙是空的！');
        return;
      }
      alert('🚢 訂單已提交！我們會盡快為您配送！');
      cart = [];
      localStorage.setItem('cart', JSON.stringify(cart));
      window.location.href = 'shop.html';
    }

    // Init
    renderCart();
  </script>
</body>
</html>
