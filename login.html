<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 / 註冊 - 智慧照護Match</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2E7D32',
            secondary: '#FF8F00',
            accent: '#D81B60',
            info: '#1976D2',
            dark: '#212121',
            bgLight: '#FAFAFA'
          },
          fontFamily: { sans: ['Noto Sans TC', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-bgLight font-sans text-dark min-h-screen flex items-center justify-center py-12">
  <div class="w-full max-w-md px-4">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-2">
        <div class="w-12 h-12 bg-primary rounded-lg flex items-center justify-center">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
          </svg>
        </div>
        <span class="text-2xl font-bold text-primary">智慧照護Match</span>
      </a>
    </div>

    <!-- Tab Switch -->
    <div class="flex bg-white rounded-lg p-1 mb-6 shadow-sm">
      <button id="tabLogin" onclick="switchTab('login')" class="flex-1 py-2.5 rounded-md font-medium bg-primary text-white transition-all">
        登入
      </button>
      <button id="tabRegister" onclick="switchTab('register')" class="flex-1 py-2.5 rounded-md font-medium text-gray-600 hover:bg-gray-50 transition-all">
        註冊
      </button>
    </div>

    <!-- Login Form -->
    <div id="loginForm" class="bg-white rounded-xl shadow-sm p-6">
      <h2 class="text-xl font-bold mb-6">會員登入</h2>
      <form onsubmit="handleLogin(event)">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="loginEmail" required placeholder="請輸入Email"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary focus:border-primary">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
          <input type="password" id="loginPassword" required placeholder="請輸入密碼" minlength="6"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary focus:border-primary">
        </div>
        <div class="flex items-center justify-between mb-6">
          <label class="flex items-center">
            <input type="checkbox" class="rounded border-gray-300 text-primary focus:ring-primary">
            <span class="ml-2 text-sm text-gray-600">記住我</span>
          </label>
          <a href="#" class="text-sm text-primary hover:underline">忘記密碼？</a>
        </div>
        <button type="submit" class="w-full btn-primary py-3">登入</button>
      </form>
      
      <div class="mt-6 pt-6 border-t">
        <p class="text-center text-sm text-gray-500 mb-4">或使用以下方式登入</p>
        <div class="grid grid-cols-2 gap-3">
          <button class="flex items-center justify-center gap-2 py-2.5 border rounded-lg hover:bg-gray-50">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google
          </button>
          <button class="flex items-center justify-center gap-2 py-2.5 border rounded-lg hover:bg-gray-50">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>
            LINE
          </button>
        </div>
      </div>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="bg-white rounded-xl shadow-sm p-6 hidden">
      <h2 class="text-xl font-bold mb-6">會員註冊</h2>
      <form onsubmit="handleRegister(event)">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">角色</label>
          <select id="registerRole" required class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary focus:border-primary">
            <option value="">請選擇身份</option>
            <option value="caregiver">我是照服員</option>
            <option value="family">我是家屬/民眾</option>
          </select>
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">姓名</label>
          <input type="text" id="registerName" required placeholder="請輸入真實姓名"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary focus:border-primary">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="registerEmail" required placeholder="請輸入Email"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary focus:border-primary">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">手機</label>
          <input type="tel" id="registerPhone" required placeholder="0912-XXX-XXX" pattern="09[0-9]{8}"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary focus:border-primary">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
          <input type="password" id="registerPassword" required placeholder="至少6個字元" minlength="6"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary focus:border-primary">
        </div>
        <div class="mb-6">
          <label class="flex items-start">
            <input type="checkbox" required class="mt-1 rounded border-gray-300 text-primary focus:ring-primary">
            <span class="ml-2 text-sm text-gray-600">我已閱讀並同意<a href="#" class="text-primary hover:underline">服務條款</a>與<a href="#" class="text-primary hover:underline">隱私權政策</a></span>
          </label>
        </div>
        <button type="submit" class="w-full btn-primary py-3">註冊</button>
      </form>
    </div>

    <!-- Demo Notice -->
    <div class="mt-6 p-4 bg-blue-50 rounded-lg">
      <p class="text-sm text-info">
        <strong>展示提示：</strong>本網站為展示用途。<br>
        • 管理員：yth_Kjfn1U@alkmail.com / sejg(EG*3tn>ek<br>
        • 一般會員：任何Email格式（6位數以上密碼）即可
      </p>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    function switchTab(tab) {
      const loginTab = document.getElementById('tabLogin');
      const registerTab = document.getElementById('tabRegister');
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');

      if (tab === 'login') {
        loginTab.classList.add('bg-primary', 'text-white');
        loginTab.classList.remove('text-gray-600', 'hover:bg-gray-50');
        registerTab.classList.remove('bg-primary', 'text-white');
        registerTab.classList.add('text-gray-600', 'hover:bg-gray-50');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
      } else {
        registerTab.classList.add('bg-primary', 'text-white');
        registerTab.classList.remove('text-gray-600', 'hover:bg-gray-50');
        loginTab.classList.remove('bg-primary', 'text-white');
        loginTab.classList.add('text-gray-600', 'hover:bg-gray-50');
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
      }
    }

    function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      // 檢查是否為管理員登入
      const adminUser = validateAdmin(email, password);
      if (adminUser) {
        currentUser = adminUser;
        saveToStorage();
        alert('管理員登入成功！');
        window.location.href = 'admin.html';
        return;
      }

      // 一般會員登入（展示用）
      currentUser = {
        id: Date.now(),
        email: email,
        name: email.split('@')[0],
        role: 'user',
        avatar: 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=100&h=100&fit=crop',
        createdAt: new Date().toISOString()
      };
      saveToStorage();

      alert('登入成功！');
      
      // 根據來源重新導向
      const params = getUrlParams();
      const redirect = params.redirect || 'dashboard.html';
      window.location.href = redirect;
    }

    function handleRegister(e) {
      e.preventDefault();
      
      const name = document.getElementById('registerName').value;
      const email = document.getElementById('registerEmail').value;
      const phone = document.getElementById('registerPhone').value;
      const role = document.getElementById('registerRole').value;
      const password = document.getElementById('registerPassword').value;

      // 演示：註冊成功
      currentUser = {
        id: Date.now(),
        email: email,
        name: name,
        phone: phone,
        role: role,
        avatar: 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=100&h=100&fit=crop',
        createdAt: new Date().toISOString()
      };
      saveToStorage();

      alert('註冊成功！歡迎加入智慧照護Match！');
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
