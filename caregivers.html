<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>探索群島 - 群島生態系</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ocean: '#0891B2',
            'ocean-light': '#22D3EE',
            'ocean-dark': '#0E7490',
            sand: '#F5F0E8',
            coral: '#F97316',
            island: '#059669',
            'island-light': '#34D399',
            night: '#0F172A',
            'night-light': '#1E293B'
          },
          fontFamily: {
            sans: ['Noto Sans TC', 'sans-serif'],
            display: ['Nunito', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    .glass-nav {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(8, 145, 178, 0.1);
    }

    /* 每張卡片都是一座島嶼 - 俯視圖 */
    .island-card {
      position: relative;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .island-card:hover {
      transform: translateY(-12px) scale(1.03);
    }

    /* 島嶼本體 - 不規則圓形 */
    .island-body {
      background: linear-gradient(145deg, #86EFAC 0%, #22C55E 40%, #16A34A 70%, #15803D 100%);
      border-radius: 45% 55% 60% 40% / 50% 45% 55% 50%;
      position: relative;
      overflow: hidden;
    }

    /* 沙灘邊緣 */
    .island-body::before {
      content: '';
      position: absolute;
      inset: -4px;
      background: linear-gradient(145deg, #FCD34D 0%, #F59E0B 50%, #D97706 100%);
      border-radius: 48% 52% 55% 45% / 52% 48% 52% 48%;
      z-index: -1;
    }

    /* 島嶼陰影 */
    .island-body::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 30%, rgba(255,255,255,0.3) 0%, transparent 60%);
      border-radius: inherit;
    }

    /* 島上的設施/建築 */
    .island-building {
      position: absolute;
      background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    /* 島嶼裝飾植物 */
    .island-tree {
      position: absolute;
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, #15803D 30%, transparent 70%);
      border-radius: 50%;
    }

    /* 島主頭像區 - 島上的主要建築 */
    .island-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    /* 海水環繞效果 */
    .island-wrapper {
      position: relative;
      padding: 16px;
      background: linear-gradient(180deg, #0891B2 0%, #0E7490 100%);
      border-radius: 24px;
    }

    /* 島嶼在海上的陰影 */
    .island-shadow {
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
    }

    /* 雲朵飄過 */
    .cloud {
      position: absolute;
      background: rgba(255,255,255,0.4);
      border-radius: 50px;
      animation: cloudMove 25s linear infinite;
    }
    @keyframes cloudMove {
      0% { transform: translateX(-100px); }
      100% { transform: translateX(calc(100vw + 100px)); }
    }

    /* 篩選器玻璃 */
    .filter-glass {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    /* 按鈕漸層 */
    .btn-search {
      background: linear-gradient(135deg, #0891B2 0%, #059669 100%);
      transition: all 0.3s ease;
    }
    .btn-search:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 24px rgba(8, 145, 178, 0.4);
    }

    /* 島嶼評價星級 */
    .star-coral { color: #F97316; }

    /* 服務標籤 */
    .service-badge {
      background: rgba(8, 145, 178, 0.15);
      border: 1px solid rgba(8, 145, 178, 0.3);
      color: #0E7490;
    }
  </style>
</head>
<body class="bg-gradient-to-b from-ocean via-ocean-light to-sand min-h-screen font-sans">
  
  <!-- Navigation -->
  <nav class="glass-nav sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-3">
          <a href="index.html" class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-ocean to-island rounded-full flex items-center justify-center shadow-lg">
              <span class="text-xl">🏝️</span>
            </div>
            <div>
              <span class="font-display font-bold text-xl bg-gradient-to-r from-ocean to-island bg-clip-text text-transparent">群島生態系</span>
              <p class="text-xs text-gray-500 -mt-1">長照服務媒合平台</p>
            </div>
          </a>
        </div>
        <div class="hidden md:flex items-center gap-6">
          <a href="index.html" class="text-night-light hover:text-ocean font-medium">首頁</a>
          <a href="caregivers.html" class="text-ocean font-bold border-b-2 border-ocean pb-1">探索群島</a>
          <a href="shop.html" class="text-night-light hover:text-ocean font-medium">補給站</a>
          <a href="dashboard.html" class="text-night-light hover:text-ocean font-medium">我的島嶼</a>
        </div>
        <div class="flex items-center gap-3">
          <a href="cart.html" class="relative p-2 text-night hover:text-ocean transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
            </svg>
            <span id="cartCount" class="absolute -top-1 -right-1 bg-coral text-white text-xs w-5 h-5 rounded-full flex items-center justify-center hidden">0</span>
          </a>
          <a href="login.html" class="bg-gradient-to-r from-ocean to-island text-white px-5 py-2 rounded-full font-bold text-sm shadow-lg hover:shadow-xl transition-all">
            登入探索
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <div class="relative py-12 overflow-hidden">
    <!-- 背景海水 -->
    <div class="absolute inset-0 bg-gradient-to-b from-ocean-dark via-ocean to-ocean-light"></div>
    
    <!-- 雲朵裝飾 -->
    <div class="cloud w-32 h-8 top-8 left-[5%]" style="animation-delay: 0s;"></div>
    <div class="cloud w-48 h-10 top-16 left-[50%]" style="animation-delay: -8s;"></div>
    <div class="cloud w-24 h-6 top-4 left-[75%]" style="animation-delay: -16s;"></div>
    
    <!-- 海浪裝飾 -->
    <div class="absolute bottom-0 left-0 right-0">
      <svg viewBox="0 0 1440 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 50L48 45C96 40 192 30 288 35C384 40 480 60 576 65C672 70 768 60 864 50C960 40 1056 30 1152 35C1248 40 1344 60 1392 70L1440 80V100H0V50Z" fill="#F5F0E8"/>
      </svg>
    </div>

    <div class="max-w-7xl mx-auto px-4 text-center relative z-10">
      <div class="inline-block bg-white/20 backdrop-blur px-5 py-2 rounded-full mb-4">
        <span class="text-white font-medium">⛵ 探索這片群島</span>
      </div>
      <h1 class="font-display font-extrabold text-4xl md:text-5xl text-white mb-4">
        探索群島
      </h1>
      <p class="text-white/90 text-lg max-w-2xl mx-auto">
        每座島嶼都有獨特的故事與專長，找到那位與你頻率相合的島主
      </p>
    </div>
  </div>

  <!-- Filter Section -->
  <div class="max-w-5xl mx-auto px-4 -mt-4 relative z-20">
    <div class="filter-glass p-6">
      <div class="grid md:grid-cols-4 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">🔍 搜尋島嶼</label>
          <input type="text" id="searchInput" placeholder="搜尋島主名字..." 
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-ocean focus:border-ocean">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">🏝️ 島嶼類型</label>
          <select id="typeFilter" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-ocean focus:border-ocean">
            <option value="">全部類型</option>
            <option value="home">🏠 居家服務島</option>
            <option value="daycare">☀️ 日照中心島</option>
            <option value="respite">🤝 喘息服務島</option>
            <option value="medical">🏥 醫療陪同島</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">📍 所在群島</label>
          <select id="regionFilter" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:ring-2 focus:ring-ocean focus:border-ocean">
            <option value="">全部地區</option>
            <option value="台北">台北市</option>
            <option value="新北">新北市</option>
            <option value="桃園">桃園市</option>
            <option value="台中">台中市</option>
            <option value="高雄">高雄市</option>
          </select>
        </div>
        <div class="flex items-end gap-2">
          <button onclick="applyFilters()" class="btn-search flex-1 text-white py-2.5 rounded-xl font-bold flex items-center justify-center gap-2">
            <span>🔍</span> 探索
          </button>
          <button onclick="resetFilters()" class="px-4 py-2.5 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors">
            重置
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Islands Grid -->
  <div class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-6">
      <p class="text-gray-600">
        🌊 共找到 <span id="resultCount" class="font-bold text-ocean text-xl">0</span> 座島嶼
      </p>
      <select id="sortBy" class="border border-gray-200 rounded-xl px-4 py-2 focus:ring-2 focus:ring-ocean bg-white">
        <option value="rating">⭐ 評價最高</option>
        <option value="price-low">💰 價格低→高</option>
        <option value="price-high">💎 價格高→低</option>
        <option value="experience">📚 經驗最多</option>
      </select>
    </div>

    <div id="caregiversList" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- 動態載入 -->
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-night text-white py-8 mt-12">
    <div class="max-w-7xl mx-auto px-4 text-center text-gray-400 text-sm">
      <p>© 2026 群島生態系 版權所有 | 本網站為展示用途</p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    let filteredCaregivers = [...caregivers];

    // 建立真實島嶼卡片
    function createIslandCard(cg) {
      const serviceIcons = { home: '🏠', daycare: '☀️', respite: '🤝', medical: '🏥' };
      const serviceLabels = { home: '居家', daycare: '日照', respite: '喘息', medical: '醫療' };

      // 隨機島嶼形狀參數
      const shapes = [
        'border-radius: 45% 55% 60% 40% / 50% 45% 55% 50%;',
        'border-radius: 55% 45% 45% 55% / 48% 52% 48% 52%;',
        'border-radius: 50% 50% 55% 45% / 45% 55% 45% 55%;',
        'border-radius: 48% 52% 40% 60% / 52% 48% 52% 48%;',
        'border-radius: 52% 48% 50% 50% / 50% 50% 52% 48%;'
      ];
      const randomShape = shapes[Math.floor(Math.random() * shapes.length)];

      // 隨機植物位置
      const treePositions = [];
      for (let i = 0; i < 5; i++) {
        const x = 10 + Math.random() * 70;
        const y = 10 + Math.random() * 70;
        const size = 8 + Math.random() * 12;
        treePositions.push({ x, y, size });
      }

      // 服務類型
      const servicesHtml = cg.services.map(s => 
        `<span class="service-badge text-xs px-2 py-1 rounded-full">${serviceIcons[s]} ${serviceLabels[s]}</span>`
      ).join('');

      return `
        <div class="island-wrapper island-shadow">
          <!-- 海水背景 -->
          <div class="bg-gradient-to-br from-ocean-dark to-ocean rounded-2xl p-4">
            <!-- 島嶼本體 -->
            <div class="island-body h-64 ${randomShape}" style="background: linear-gradient(145deg, #86EFAC 0%, #22C55E 40%, #16A34A 70%, #15803D 100%);">
              
              <!-- 沙灘邊緣 -->
              <div style="position:absolute;inset:-4px;background:linear-gradient(145deg, #FCD34D 0%, #F59E0B 50%, #D97706 100%);${randomShape}z-index:-1;"></div>
              
              <!-- 島上的樹叢裝飾 -->
              ${treePositions.map(t => `
                <div style="
                  position:absolute;
                  left:${t.x}%;
                  top:${t.y}%;
                  width:${t.size}px;
                  height:${t.size}px;
                  background:radial-gradient(circle, #166534 40%, transparent 70%);
                  border-radius:50%;
                  opacity:0.7;
                "></div>
              `).join('')}
              
              <!-- 島主頭像 - 島上的房子 -->
              <div class="island-center">
                <div class="relative inline-block">
                  <img src="${cg.avatar}" alt="${cg.name}" 
                       class="w-20 h-20 rounded-full border-4 border-amber-300 object-cover shadow-2xl">
                  ${cg.certified ? `
                    <div class="absolute -bottom-1 -right-1 w-7 h-7 bg-island rounded-full flex items-center justify-center text-white text-xs border-2 border-white shadow-lg">
                      ✓
                    </div>
                  ` : ''}
                </div>
                
                <!-- 島主名字 -->
                <h3 class="font-display font-bold text-lg text-white mt-3 drop-shadow-lg">${cg.name}</h3>
                <p class="text-white/80 text-sm">📍 ${cg.location}</p>
                
                <!-- 評價 -->
                <div class="flex items-center justify-center gap-1 mt-1">
                  <span class="star-coral text-sm">★★★★★</span>
                  <span class="font-bold text-white text-sm">${cg.rating}</span>
                  <span class="text-white/60 text-xs">(${cg.reviews})</span>
                </div>
                
                <!-- 年資 -->
                <div class="inline-block bg-white/20 backdrop-blur px-3 py-1 rounded-full mt-2">
                  <span class="text-white text-xs">🌴 ${cg.experience}年經驗</span>
                </div>
              </div>
              
              <!-- 服務類型標籤 - 島上設施標示 -->
              <div class="absolute bottom-3 left-0 right-0 flex justify-center gap-1 flex-wrap px-2">
                ${servicesHtml}
              </div>
            </div>
          </div>
          
          <!-- 島嶼資訊底板 -->
          <div class="bg-white rounded-b-xl p-4 -mt-2 relative z-10">
            <p class="text-gray-600 text-sm line-clamp-2 mb-3 text-center">${cg.intro}</p>
            
            <div class="flex items-center justify-between">
              <div>
                <span class="text-2xl font-bold text-coral">$${cg.price}</span>
                <span class="text-gray-400 text-sm">/小時</span>
              </div>
              <div class="flex gap-2">
                <a href="caregiver-profile.html?id=${cg.id}" 
                   class="px-3 py-1.5 border-2 border-ocean text-ocean rounded-full text-sm font-bold hover:bg-ocean/5 transition-colors">
                  詳情
                </a>
                <a href="booking.html?caregiverId=${cg.id}" 
                   class="px-3 py-1.5 bg-gradient-to-r from-ocean to-island text-white rounded-full text-sm font-bold hover:shadow-lg transition-all">
                  預約
                </a>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function applyFilters() {
      const search = document.getElementById('searchInput').value.trim();
      const type = document.getElementById('typeFilter').value;
      const region = document.getElementById('regionFilter').value;

      filteredCaregivers = caregivers.filter(cg => {
        if (search) {
          const searchLower = search.toLowerCase();
          const matchName = cg.name.toLowerCase().includes(searchLower);
          const matchLocation = cg.location.toLowerCase().includes(searchLower);
          const matchServices = cg.services.some(s => s.toLowerCase().includes(searchLower));
          if (!matchName && !matchLocation && !matchServices) return false;
        }
        if (type && !cg.services.includes(type)) return false;
        if (region && !cg.location.includes(region)) return false;
        return true;
      });

      sortCaregivers();
      renderCaregivers();
    }

    function resetFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('typeFilter').value = '';
      document.getElementById('regionFilter').value = '';
      filteredCaregivers = [...caregivers];
      sortCaregivers();
      renderCaregivers();
    }

    function sortCaregivers() {
      const sortBy = document.getElementById('sortBy').value;
      switch (sortBy) {
        case 'rating':
          filteredCaregivers.sort((a, b) => b.rating - a.rating);
          break;
        case 'price-low':
          filteredCaregivers.sort((a, b) => a.price - b.price);
          break;
        case 'price-high':
          filteredCaregivers.sort((a, b) => b.price - a.price);
          break;
        case 'experience':
          filteredCaregivers.sort((a, b) => b.experience - a.experience);
          break;
      }
    }

    function renderCaregivers() {
      const container = document.getElementById('caregiversList');
      const count = document.getElementById('resultCount');
      
      count.textContent = filteredCaregivers.length;
      
      if (filteredCaregivers.length === 0) {
        container.innerHTML = `
          <div class="col-span-3 text-center py-16">
            <div class="text-6xl mb-4">🏝️</div>
            <p class="text-gray-500 text-lg mb-4">這片海域還沒有島嶼</p>
            <button onclick="resetFilters()" class="text-ocean font-bold hover:underline">清除搜尋條件</button>
          </div>
        `;
        return;
      }

      container.innerHTML = filteredCaregivers.map(cg => createIslandCard(cg)).join('');
    }

    function initFromUrl() {
      const params = getUrlParams();
      if (params.type) {
        const serviceMap = { home: 'home', daycare: 'daycare', respite: 'respite', medical: 'medical' };
        if (serviceMap[params.type]) {
          document.getElementById('typeFilter').value = serviceMap[params.type];
        }
      }
      if (params.region) {
        const regionMap = { taipei: '台北', newtaipei: '新北', taoyuan: '桃園', taichung: '台中', kaohsiung: '高雄' };
        const region = regionMap[params.region];
        if (region) document.getElementById('regionFilter').value = region;
      }
      applyFilters();
    }

    document.getElementById('sortBy').addEventListener('change', () => {
      sortCaregivers();
      renderCaregivers();
    });

    document.addEventListener('DOMContentLoaded', () => {
      initFromUrl();
      updateCartCount();
    });
  </script>
</body>
</html>
