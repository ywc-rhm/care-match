<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找照服員 - 智慧照護Match</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2E7D32',
            secondary: '#FF8F00',
            accent: '#D81B60',
            info: '#1976D2',
            dark: '#212121',
            bgLight: '#FAFAFA'
          },
          fontFamily: {
            sans: ['Noto Sans TC', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    .star-rating { color: #FFB300; }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.15); }
  </style>
</head>
<body class="bg-bgLight font-sans text-dark">
  <!-- Navigation (same as index) -->
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-2">
          <a href="index.html" class="flex items-center gap-2">
            <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
              </svg>
            </div>
            <span class="text-xl font-bold text-primary">智慧照護Match</span>
          </a>
        </div>
        <div class="hidden md:flex items-center gap-6">
          <a href="index.html" class="text-dark hover:text-primary font-medium">首頁</a>
          <a href="caregivers.html" class="text-primary font-medium border-b-2 border-primary pb-1">找照服員</a>
          <a href="shop.html" class="text-dark hover:text-primary font-medium">輔具商城</a>
          <a href="dashboard.html" class="text-dark hover:text-primary font-medium">我的專區</a>
        </div>
        <div class="flex items-center gap-3">
          <a href="cart.html" class="relative p-2 text-dark hover:text-primary">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            <span id="cartCount" class="absolute -top-1 -right-1 bg-accent text-white text-xs w-5 h-5 rounded-full flex items-center justify-center hidden">0</span>
          </a>
          <a href="login.html" class="btn-primary text-sm">登入 / 註冊</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="bg-white border-b">
    <div class="max-w-7xl mx-auto px-4 py-8">
      <h1 class="text-2xl md:text-3xl font-bold mb-2">找照服員</h1>
      <p class="text-gray-600">找到最適合您的照護服務人員</p>
    </div>
  </div>

  <!-- Filter Section -->
  <div class="bg-white border-b sticky top-16 z-40">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex flex-col md:flex-row gap-4">
        <div class="flex-1">
          <input type="text" id="searchInput" placeholder="搜尋照服員姓名、地點..." 
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary focus:border-primary">
        </div>
        <select id="typeFilter" class="border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary focus:border-primary">
          <option value="">服務類型</option>
          <option value="home">居家服務</option>
          <option value="daycare">日間照顧</option>
          <option value="respite">喘息服務</option>
          <option value="medical">醫療陪同</option>
        </select>
        <select id="regionFilter" class="border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary focus:border-primary">
          <option value="">所在地區</option>
          <option value="台北">台北市</option>
          <option value="新北">新北市</option>
          <option value="桃園">桃園市</option>
          <option value="台中">台中市</option>
          <option value="高雄">高雄市</option>
        </select>
        <select id="priceFilter" class="border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-primary focus:border-primary">
          <option value="">價格範圍</option>
          <option value="0-350">$350以下/小時</option>
          <option value="350-400">$350-$400/小時</option>
          <option value="400-999">$400以上/小時</option>
        </select>
        <button onclick="applyFilters()" class="btn-primary px-6">搜尋</button>
        <button onclick="resetFilters()" class="px-6 py-2.5 border border-gray-300 rounded-lg hover:bg-gray-50">重置</button>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-6">
      <p class="text-gray-600">共找到 <span id="resultCount" class="font-bold text-primary">0</span> 位照服員</p>
      <select id="sortBy" class="border border-gray-300 rounded-lg px-4 py-2">
        <option value="rating">評價最高</option>
        <option value="price-low">價格低→高</option>
        <option value="price-high">價格高→低</option>
        <option value="experience">經驗最多</option>
      </select>
    </div>

    <div id="caregiversList" class="grid md:grid-cols-2 gap-6">
      <!-- 動態載入 -->
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white py-8 mt-12">
    <div class="max-w-7xl mx-auto px-4 text-center text-gray-400 text-sm">
      <p>© 2026 智慧照護Match 版權所有 | 本網站為展示用途</p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    let filteredCaregivers = [...caregivers];

    function applyFilters() {
      const search = document.getElementById('searchInput').value.trim();
      const type = document.getElementById('typeFilter').value;
      const region = document.getElementById('regionFilter').value;
      const priceRange = document.getElementById('priceFilter').value;

      filteredCaregivers = caregivers.filter(cg => {
        // 關鍵字搜尋
        if (search) {
          const searchLower = search.toLowerCase();
          const matchName = cg.name.toLowerCase().includes(searchLower);
          const matchLocation = cg.location.toLowerCase().includes(searchLower);
          const matchServices = cg.services.some(s => s.toLowerCase().includes(searchLower));
          if (!matchName && !matchLocation && !matchServices) return false;
        }

        // 服務類型
        if (type && !cg.services.includes(type)) return false;

        // 地區
        if (region && !cg.location.includes(region)) return false;

        // 價格範圍
        if (priceRange) {
          const [min, max] = priceRange.split('-').map(Number);
          if (cg.price < min || cg.price > max) return false;
        }

        return true;
      });

      sortCaregivers();
      renderCaregivers();
    }

    function resetFilters() {
      document.getElementById('searchInput').value = '';
      document.getElementById('typeFilter').value = '';
      document.getElementById('regionFilter').value = '';
      document.getElementById('priceFilter').value = '';
      filteredCaregivers = [...caregivers];
      sortCaregivers();
      renderCaregivers();
    }

    function sortCaregivers() {
      const sortBy = document.getElementById('sortBy').value;
      switch (sortBy) {
        case 'rating':
          filteredCaregivers.sort((a, b) => b.rating - a.rating);
          break;
        case 'price-low':
          filteredCaregivers.sort((a, b) => a.price - b.price);
          break;
        case 'price-high':
          filteredCaregivers.sort((a, b) => b.price - a.price);
          break;
        case 'experience':
          filteredCaregivers.sort((a, b) => b.experience - a.experience);
          break;
      }
    }

    function renderCaregivers() {
      const container = document.getElementById('caregiversList');
      const count = document.getElementById('resultCount');
      
      count.textContent = filteredCaregivers.length;
      
      if (filteredCaregivers.length === 0) {
        container.innerHTML = `
          <div class="col-span-2 text-center py-16">
            <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p class="text-gray-500">找不到符合條件的照服員</p>
            <button onclick="resetFilters()" class="mt-4 text-primary hover:underline">清除搜尋條件</button>
          </div>
        `;
        return;
      }

      container.innerHTML = filteredCaregivers.map(cg => createCaregiverCard(cg)).join('');
    }

    // 從 URL 參數初始化篩選
    function initFromUrl() {
      const params = getUrlParams();
      
      if (params.type) {
        document.getElementById('typeFilter').value = params.type;
      }
      if (params.region) {
        const regionMap = {
          'taipei': '台北',
          'newtaipei': '新北',
          'taoyuan': '桃園',
          'taichung': '台中',
          'kaohsiung': '高雄'
        };
        document.getElementById('regionFilter').value = regionMap[params.region] || '';
      }
      if (params.date) {
        // 日期篩選可在細節頁體現
      }
      
      if (params.type || params.region) {
        applyFilters();
      } else {
        sortCaregivers();
        renderCaregivers();
      }
    }

    // 監聽排序變更
    document.getElementById('sortBy').addEventListener('change', () => {
      sortCaregivers();
      renderCaregivers();
    });

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      initFromUrl();
      updateCartCount();
    });
  </script>
</body>
</html>
