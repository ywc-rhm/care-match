<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品詳情 - 智慧照護Match</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2E7D32',
            secondary: '#FF8F00',
            accent: '#D81B60',
            info: '#1976D2',
            dark: '#212121',
            bgLight: '#FAFAFA'
          },
          fontFamily: { sans: ['Noto Sans TC', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    .star-rating { color: #FFB300; }
  </style>
</head>
<body class="bg-bgLight font-sans text-dark">
  <!-- Navigation -->
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-2">
          <a href="index.html" class="flex items-center gap-2">
            <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
              </svg>
            </div>
            <span class="text-xl font-bold text-primary">智慧照護Match</span>
          </a>
        </div>
        <div class="hidden md:flex items-center gap-6">
          <a href="index.html" class="text-dark hover:text-primary font-medium">首頁</a>
          <a href="caregivers.html" class="text-dark hover:text-primary font-medium">找照服員</a>
          <a href="shop.html" class="text-dark hover:text-primary font-medium">輔具商城</a>
          <a href="dashboard.html" class="text-dark hover:text-primary font-medium">我的專區</a>
        </div>
        <div class="flex items-center gap-3">
          <a href="cart.html" class="relative p-2 text-dark hover:text-primary">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
            <span id="cartCount" class="absolute -top-1 -right-1 bg-accent text-white text-xs w-5 h-5 rounded-full flex items-center justify-center hidden">0</span>
          </a>
          <a href="login.html" class="btn-primary text-sm">登入 / 註冊</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Content -->
  <div class="max-w-5xl mx-auto px-4 py-8" id="productContent">
    <!-- 動態載入 -->
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white py-8 mt-12">
    <div class="max-w-7xl mx-auto px-4 text-center text-gray-400 text-sm">
      <p>© 2026 智慧照護Match 版權所有 | 本網站為展示用途</p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    function renderProduct() {
      const params = getUrlParams();
      const productId = parseInt(params.id);
      const prod = products.find(p => p.id === productId);

      if (!prod) {
        document.getElementById('productContent').innerHTML = `
          <div class="text-center py-16">
            <h2 class="text-2xl font-bold mb-4">找不到此商品</h2>
            <a href="shop.html" class="btn-primary inline-block">返回商城</a>
          </div>
        `;
        return;
      }

      const discount = prod.originalPrice 
        ? Math.round((1 - prod.price / prod.originalPrice) * 100) 
        : null;

      document.getElementById('productContent').innerHTML = `
        <a href="shop.html" class="inline-flex items-center gap-1 text-gray-600 hover:text-primary mb-6">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          返回商城
        </a>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <div class="grid md:grid-cols-2 gap-8 p-6">
            <!-- Image -->
            <div class="relative">
              <img src="${prod.image}" alt="${prod.name}" class="w-full rounded-lg">
              ${discount ? `
                <span class="absolute top-4 right-4 bg-accent text-white text-sm px-3 py-1 rounded-full font-bold">
                  -${discount}% OFF
                </span>
              ` : ''}
            </div>

            <!-- Info -->
            <div>
              <span class="bg-green-100 text-primary text-sm px-3 py-1 rounded-full">${prod.categoryName}</span>
              <h1 class="text-2xl font-bold mt-3 mb-2">${prod.name}</h1>
              
              <div class="flex items-center gap-2 mb-4">
                <span class="star-rating text-lg">★</span>
                <span class="font-bold">${prod.rating}</span>
                <span class="text-gray-400">| 已售 ${prod.sold}</span>
              </div>

              <div class="flex items-end gap-3 mb-6">
                <span class="text-3xl font-bold text-accent">$${prod.price.toLocaleString()}</span>
                ${prod.originalPrice ? `
                  <span class="text-xl text-gray-400 line-through">$${prod.originalPrice.toLocaleString()}</span>
                ` : ''}
              </div>

              <div class="space-y-2 mb-6">
                <p class="text-gray-600">${prod.description}</p>
              </div>

              <!-- Features -->
              <div class="mb-6">
                <h3 class="font-bold mb-2">商品特色</h3>
                <div class="grid grid-cols-2 gap-2">
                  ${prod.features.map(f => `
                    <div class="flex items-center gap-2 text-sm">
                      <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                      </svg>
                      <span>${f}</span>
                    </div>
                  `).join('')}
                </div>
              </div>

              <!-- Stock -->
              <div class="flex items-center gap-2 mb-6">
                <span class="text-gray-500">庫存：</span>
                <span class="${prod.stock > 10 ? 'text-green-600' : prod.stock > 0 ? 'text-orange-600' : 'text-red-600'} font-bold">
                  ${prod.stock > 10 ? '充足' : prod.stock > 0 ? '僅剩 ' + prod.stock + ' 件' : '補貨中'}
                </span>
              </div>

              <!-- Quantity -->
              <div class="flex items-center gap-4 mb-6">
                <span class="text-gray-600">數量：</span>
                <div class="flex items-center border rounded-lg">
                  <button onclick="changeQty(-1)" class="px-3 py-2 hover:bg-gray-100">-</button>
                  <input type="number" id="qty" value="1" min="1" max="${prod.stock}" class="w-16 text-center border-x py-2">
                  <button onclick="changeQty(1)" class="px-3 py-2 hover:bg-gray-100">+</button>
                </div>
              </div>

              <!-- Actions -->
              <div class="flex gap-3">
                <button onclick="addProductToCart(${prod.id})" class="flex-1 btn-secondary py-3 flex items-center justify-center gap-2">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                  </svg>
                  加入購物車
                </button>
                <button onclick="buyNow(${prod.id})" class="flex-1 btn-primary py-3">立即購買</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Related Products -->
        <div class="mt-8">
          <h2 class="text-xl font-bold mb-6">同類商品推薦</h2>
          <div class="grid md:grid-cols-4 gap-6" id="relatedProducts">
          </div>
        </div>
      `;

      // 載入相關商品
      const related = products.filter(p => p.category === prod.category && p.id !== prod.id).slice(0, 4);
      document.getElementById('relatedProducts').innerHTML = related.length > 0 
        ? related.map(p => createProductCard(p)).join('')
        : '<p class="text-gray-500 col-span-4">暫無推薦商品</p>';
    }

    function changeQty(delta) {
      const input = document.getElementById('qty');
      const newVal = Math.max(1, Math.min(99, parseInt(input.value) + delta));
      input.value = newVal;
    }

    function addProductToCart(productId) {
      addToCart(productId);
      showNotification('已加入購物車');
    }

    function buyNow(productId) {
      if (!checkLogin()) return;
      
      const qty = parseInt(document.getElementById('qty').value);
      const prod = products.find(p => p.id === productId);
      
      // 直接加入一件並跳轉結帳
      orders.products.push({ ...prod, quantity: qty });
      saveToStorage();
      updateCartCount();
      
      window.location.href = 'cart.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderProduct();
      updateCartCount();
    });
  </script>
</body>
</html>
