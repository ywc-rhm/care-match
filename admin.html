<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理後台 - 智慧照護Match</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2E7D32',
            secondary: '#FF8F00',
            accent: '#D81B60',
            info: '#1976D2',
            dark: '#212121',
            bgLight: '#FAFAFA'
          },
          fontFamily: { sans: ['Noto Sans TC', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-bgLight font-sans text-dark">
  <!-- Navigation -->
  <nav class="bg-dark text-white shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-2">
          <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
            </svg>
          </div>
          <span class="text-xl font-bold">智慧照護Match 管理後台</span>
        </div>
        <div class="flex items-center gap-4">
          <span class="text-sm text-gray-300">
            <span id="adminName">管理員</span>
          </span>
          <a href="index.html" onclick="logout()" class="text-sm hover:text-red-400">登出</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Sidebar + Content -->
  <div class="flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow-sm min-h-screen">
      <nav class="p-4 space-y-1">
        <button onclick="showSection('dashboard')" id="nav-dashboard" class="nav-btn w-full text-left px-4 py-3 rounded-lg bg-primary text-white font-medium">
          📊 儀表板
        </button>
        <button onclick="showSection('caregivers')" id="nav-caregivers" class="nav-btn w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100">
          👤 照服員管理
        </button>
        <button onclick="showSection('users')" id="nav-users" class="nav-btn w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100">
          👥 會員管理
        </button>
        <button onclick="showSection('bookings')" id="nav-bookings" class="nav-btn w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100">
          📅 預約管理
        </button>
        <button onclick="showSection('products')" id="nav-products" class="nav-btn w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100">
          📦 商品管理
        </button>
        <button onclick="showSection('orders')" id="nav-orders" class="nav-btn w-full text-left px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100">
          🛒 訂單管理
        </button>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8">
      <div id="section-dashboard" class="section-content">
        <!-- 儀表板內容 -->
        <h1 class="text-2xl font-bold mb-6">系統概覽</h1>
        <div class="grid md:grid-cols-4 gap-6 mb-8">
          <div class="bg-white rounded-xl p-6 shadow-sm">
            <p class="text-gray-500 text-sm">照服員數</p>
            <p class="text-3xl font-bold text-primary" id="stat-caregivers">0</p>
          </div>
          <div class="bg-white rounded-xl p-6 shadow-sm">
            <p class="text-gray-500 text-sm">註冊會員</p>
            <p class="text-3xl font-bold text-info" id="stat-users">0</p>
          </div>
          <div class="bg-white rounded-xl p-6 shadow-sm">
            <p class="text-gray-500 text-sm">本月訂單</p>
            <p class="text-3xl font-bold text-secondary" id="stat-bookings">0</p>
          </div>
          <div class="bg-white rounded-xl p-6 shadow-sm">
            <p class="text-gray-500 text-sm">商品總數</p>
            <p class="text-3xl font-bold text-accent" id="stat-products">0</p>
          </div>
        </div>
        <div class="grid md:grid-cols-2 gap-6">
          <div class="bg-white rounded-xl p-6 shadow-sm">
            <h3 class="font-bold mb-4">最近預約</h3>
            <div id="recent-bookings" class="space-y-3"></div>
          </div>
          <div class="bg-white rounded-xl p-6 shadow-sm">
            <h3 class="font-bold mb-4">熱門商品</h3>
            <div id="popular-products" class="space-y-3"></div>
          </div>
        </div>
      </div>

      <div id="section-caregivers" class="section-content hidden">
        <h1 class="text-2xl font-bold mb-6">照服員管理</h1>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">姓名</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">地區</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">服務項目</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">評價</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">狀態</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">操作</th>
              </tr>
            </thead>
            <tbody id="caregivers-table" class="divide-y"></tbody>
          </table>
        </div>
      </div>

      <div id="section-users" class="section-content hidden">
        <h1 class="text-2xl font-bold mb-6">會員管理</h1>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">姓名</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">Email</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">身份</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">註冊日期</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">操作</th>
              </tr>
            </thead>
            <tbody id="users-table" class="divide-y">
              <tr>
                <td class="px-4 py-3">系統管理員</td>
                <td class="px-4 py-3">123@gmail.com</td>
                <td class="px-4 py-3"><span class="bg-red-100 text-red-600 px-2 py-0.5 rounded text-xs">管理員</span></td>
                <td class="px-4 py-3">2026-01-01</td>
                <td class="px-4 py-3">-</td>
              </tr>
              <tr>
                <td class="px-4 py-3">示範會員</td>
                <td class="px-4 py-3">demo@example.com</td>
                <td class="px-4 py-3"><span class="bg-blue-100 text-blue-600 px-2 py-0.5 rounded text-xs">一般會員</span></td>
                <td class="px-4 py-3">2026-04-01</td>
                <td class="px-4 py-3">
                  <button class="text-red-500 text-sm hover:underline">停權</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div id="section-bookings" class="section-content hidden">
        <h1 class="text-2xl font-bold mb-6">預約管理</h1>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">預約編號</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">照服員</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">日期</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">時段</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">金額</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">狀態</th>
              </tr>
            </thead>
            <tbody id="bookings-table" class="divide-y"></tbody>
          </table>
        </div>
      </div>

      <div id="section-products" class="section-content hidden">
        <h1 class="text-2xl font-bold mb-6">商品管理</h1>
        <div class="flex justify-between items-center mb-4">
          <p class="text-gray-500">共 <span id="product-count">0</span> 項商品</p>
          <button class="btn-primary text-sm">+ 新增商品</button>
        </div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">商品</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">分類</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">價格</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">庫存</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">操作</th>
              </tr>
            </thead>
            <tbody id="products-table" class="divide-y"></tbody>
          </table>
        </div>
      </div>

      <div id="section-orders" class="section-content hidden">
        <h1 class="text-2xl font-bold mb-6">訂單管理</h1>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">訂單編號</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">商品名稱</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">數量</th>
                <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">金額</th>
              </tr>
            </thead>
            <tbody id="orders-table" class="divide-y"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    // 檢查是否為管理員
    function checkAdmin() {
      if (!currentUser || currentUser.role !== 'admin') {
        alert('此頁面僅限管理員存取');
        window.location.href = 'login.html';
        return false;
      }
      return true;
    }

    function initAdmin() {
      if (!checkAdmin()) return;
      
      document.getElementById('adminName').textContent = currentUser.name;
      loadStats();
      loadCaregiversTable();
      loadProductsTable();
      loadBookingsTable();
    }

    function showSection(section) {
      // 隱藏所有區塊
      document.querySelectorAll('.section-content').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.remove('bg-primary', 'text-white');
        btn.classList.add('text-gray-600', 'hover:bg-gray-100');
      });

      // 顯示選中區塊
      document.getElementById('section-' + section).classList.remove('hidden');
      const navBtn = document.getElementById('nav-' + section);
      if (navBtn) {
        navBtn.classList.add('bg-primary', 'text-white');
        navBtn.classList.remove('text-gray-600', 'hover:bg-gray-100');
      }
    }

    function loadStats() {
      document.getElementById('stat-caregivers').textContent = caregivers.length;
      document.getElementById('stat-users').textContent = '2';
      document.getElementById('stat-bookings').textContent = orders.bookings.length;
      document.getElementById('stat-products').textContent = products.length;

      // 最近預約
      const recentBookings = orders.bookings.slice(-5).reverse();
      document.getElementById('recent-bookings').innerHTML = recentBookings.length > 0
        ? recentBookings.map(b => `
            <div class="flex justify-between items-center py-2 border-b last:border-0">
              <div>
                <p class="font-medium">${b.caregiverName}</p>
                <p class="text-sm text-gray-500">${b.date} ${b.time}</p>
              </div>
              <span class="text-accent font-bold">$${b.totalPrice}</span>
            </div>
          `).join('')
        : '<p class="text-gray-500">尚無預約記錄</p>';

      // 熱門商品
      const popular = [...products].sort((a, b) => b.sold - a.sold).slice(0, 3);
      document.getElementById('popular-products').innerHTML = popular.map(p => `
        <div class="flex justify-between items-center py-2 border-b last:border-0">
          <div class="flex items-center gap-3">
            <img src="${p.image}" class="w-10 h-10 rounded object-cover">
            <div>
              <p class="font-medium text-sm">${p.name}</p>
              <p class="text-xs text-gray-500">已售 ${p.sold}</p>
            </div>
          </div>
          <span class="font-bold text-accent">$${p.price}</span>
        </div>
      `).join('');
    }

    function loadCaregiversTable() {
      document.getElementById('caregivers-table').innerHTML = caregivers.map(cg => `
        <tr>
          <td class="px-4 py-3">
            <div class="flex items-center gap-3">
              <img src="${cg.avatar}" class="w-10 h-10 rounded-full object-cover">
              <span class="font-medium">${cg.name}</span>
            </div>
          </td>
          <td class="px-4 py-3">${cg.location}</td>
          <td class="px-4 py-3">${cg.serviceNames.join('、')}</td>
          <td class="px-4 py-3">
            <span class="star-rating">★</span> ${cg.rating}
          </td>
          <td class="px-4 py-3">
            <span class="${cg.certified ? 'bg-green-100 text-green-600' : 'bg-gray-100 text-gray-600'} px-2 py-0.5 rounded text-xs">
              ${cg.certified ? '已認證' : '未認證'}
            </span>
          </td>
          <td class="px-4 py-3">
            <button class="text-primary text-sm hover:underline mr-2">編輯</button>
            <button class="text-red-500 text-sm hover:underline">停權</button>
          </td>
        </tr>
      `).join('');
    }

    function loadProductsTable() {
      document.getElementById('product-count').textContent = products.length;
      document.getElementById('products-table').innerHTML = products.map(p => `
        <tr>
          <td class="px-4 py-3">
            <div class="flex items-center gap-3">
              <img src="${p.image}" class="w-12 h-12 rounded object-cover">
              <span class="font-medium">${p.name}</span>
            </div>
          </td>
          <td class="px-4 py-3">${p.categoryName}</td>
          <td class="px-4 py-3 font-bold text-accent">$${p.price}</td>
          <td class="px-4 py-3">
            <span class="${p.stock > 10 ? 'text-green-600' : p.stock > 0 ? 'text-orange-600' : 'text-red-600'}">
              ${p.stock > 10 ? '充足' : p.stock > 0 ? '僅剩 ' + p.stock : '補貨中'}
            </span>
          </td>
          <td class="px-4 py-3">
            <button class="text-primary text-sm hover:underline mr-2">編輯</button>
            <button class="text-red-500 text-sm hover:underline">下架</button>
          </td>
        </tr>
      `).join('');
    }

    function loadBookingsTable() {
      if (orders.bookings.length === 0) {
        document.getElementById('bookings-table').innerHTML = `
          <tr>
            <td colspan="6" class="px-4 py-8 text-center text-gray-500">尚無預約記錄</td>
          </tr>
        `;
        return;
      }
      const statusColors = { pending: 'bg-yellow-100 text-yellow-700', confirmed: 'bg-green-100 text-green-700', completed: 'bg-blue-100 text-blue-700', cancelled: 'bg-gray-100 text-gray-500' };
      const statusNames = { pending: '待確認', confirmed: '已確認', completed: '已完成', cancelled: '已取消' };
      document.getElementById('bookings-table').innerHTML = orders.bookings.map(b => `
        <tr>
          <td class="px-4 py-3">#${b.id}</td>
          <td class="px-4 py-3">${b.caregiverName}</td>
          <td class="px-4 py-3">${b.date}</td>
          <td class="px-4 py-3">${b.time}</td>
          <td class="px-4 py-3 font-bold text-accent">$${b.totalPrice}</td>
          <td class="px-4 py-3">
            <span class="${statusColors[b.status] || 'bg-gray-100 text-gray-600'} px-2 py-0.5 rounded text-xs">
              ${statusNames[b.status] || b.status}
            </span>
          </td>
        </tr>
      `).join('');
    }

    function logout() {
      currentUser = null;
      saveToStorage();
      window.location.href = 'index.html';
    }

    document.addEventListener('DOMContentLoaded', initAdmin);
  </script>
</body>
</html>
